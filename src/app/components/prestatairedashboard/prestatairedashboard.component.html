<section class="dashboard section">
    <div class="container">
        <div class="row">

            <!-- ================= SIDEBAR ================= -->
            <div class="col-lg-4">
                <div class="sidebar">

                    <!-- USER CARD -->
                    <div *ngFor="let users of user">
                        <div class="widget user-dashboard-profile text-center">
                            <div class="profile-thumb">
                                <img [src]="users.img" class="rounded-circle"
                                    style="width: 200px; height: 200px; object-fit: cover;">
                            </div>

                            <h5 class="mt-3">
                                {{users.firstname}} {{users.lastname}}
                            </h5>
                            <a routerLink="profile" class="btn btn-primary btn-sm mt-2">
                                Edit Profile
                            </a>

                        </div>

                        
                    </div>

                    <!-- MENU -->


                </div>
            </div>


            <!-- ================= RIGHT SIDE ================= -->
            <div class="col-lg-8">

                <div class="widget dashboard-container">

                    <!-- TABS -->
                    <ul class="nav nav-tabs">

                        <li class="nav-item">
                            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#services">
                                Services
                            </button>
                        </li>


                    </ul>
                    <!-- TAB CONTENT -->
                    <div class="tab-content mt-4">

                        <!-- SERVICES -->
                       <div class="tab-pane fade show active" id="services">
							<app-servicetab [servicetab]="servicetab" (serviceoutput)="deletservicre($event)">
							</app-servicetab>
						</div>




                    </div>

                </div>
            </div>

        </div>
    </div>
</section>
