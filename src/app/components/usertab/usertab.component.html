<table class="table table-responsive product-dashboard-table">
    <thead>
        <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Last Name</th>
            <th class="text-center">email</th>
            <th class="text-center">Action</th>
        </tr>
    </thead>

    <tbody>
        <tr *ngFor="let client of clienttab">
            <td class="product-thumb">
                <img width="80px" [src]="client.img">
            </td>

            <td class="product-details">
                <h3 class="title">{{client.firstname}}</h3>
            </td>

            <td class="product-details">
                <h3 class="title">{{client.lastname}}</h3>
            </td>

            <td class="product-category">
                <span class="categories">{{client.email}}</span>
            </td>

            <td class="action">
                <ul class="list-inline justify-content-center">
                    
                    <li class="list-inline-item">
                        <a class="delete" href="">
                            <i class="fa fa-trash" (click)="deletuser(client._id)"></i>
                        </a>
                    </li>
                   

                  
                </ul>
            </td>
        </tr>
    </tbody>
</table>
