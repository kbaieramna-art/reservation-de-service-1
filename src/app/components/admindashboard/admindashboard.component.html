<section class="dashboard section py-5" style="background:#f5f7fb; min-height:100vh;">
  <div class="container">
    <div class="row g-4">

      <!-- ================= SIDEBAR ================= -->
      <div class="col-lg-4">
        <div class="card shadow border-0 rounded-4 p-4 text-center">

          <div *ngFor="let admintab of admin">

            <img [src]="admintab.img"
                 class="rounded-circle shadow"
                 style="width:140px;height:140px;object-fit:cover;">

            <h4 class="mt-3 fw-bold">
              {{admintab.firstname}} {{admintab.lastname}}
            </h4>

            <button routerLink="profile"
                    class="btn btn-primary px-4 rounded-pill mt-2">
              Edit Profile
            </button>

          </div>

        </div>

        <!-- MENU -->
        <div class="card shadow border-0 rounded-4 mt-4">
          <ul class="list-group list-group-flush">

            <li class="list-group-item fw-semibold">
              Dashboard
            </li>

            <li class="list-group-item text-danger">
              Delete Account
            </li>

          </ul>
        </div>
      </div>


      <!-- ================= RIGHT SIDE ================= -->
      <div class="col-lg-8">

        <div class="card shadow border-0 rounded-4 p-4">

          <!-- TABS -->
          <div class="d-flex gap-3 mb-4">

            <button class="btn"
              [ngClass]="selectedTab === 'services'
              ? 'btn-primary'
              : 'btn-outline-primary'"
              (click)="selectedTab = 'services'">

              Services
            </button>

            <button class="btn"
              [ngClass]="selectedTab === 'users'
              ? 'btn-primary'
              : 'btn-outline-primary'"
              (click)="selectedTab = 'users'">

              Users
            </button>

            <button class="btn"
              [ngClass]="selectedTab === 'prestataire'
              ? 'btn-primary'
              : 'btn-outline-primary'"
              (click)="selectedTab = 'prestataire'">

              Prestataires
            </button>

          </div>


          <!-- CONTENT -->

          <!-- SERVICES -->
          <div *ngIf="selectedTab === 'services'">
            <app-servicetab
              [servicetab]="service"
              (serviceoutput)="deletservicre($event)">
            </app-servicetab>
          </div>

          <!-- USERS -->
          <div *ngIf="selectedTab === 'users'">
            <app-usertab
              [clienttab]="client"
              (clientoutput)="deletclient($event)">
            </app-usertab>
          </div>

          <!-- PRESTATAIRE -->
          <div *ngIf="selectedTab === 'prestataire'">
            <app-prestatairetab [prestatairetab]="prestataire" (prestataireoutput)="deletprestataire($event)">
            </app-prestatairetab>
          </div>

        </div>
      </div>

    </div>
  </div>
</section>
